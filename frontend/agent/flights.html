<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBridge RMS - Agent Flight Search</title>
  <link rel="stylesheet" href="../assets/css/agent.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>SkyBridge RMS</strong>
      <span id="session-user"></span>
    </div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="flights.html">Flights</a>
      <a href="passengers.html">Passengers</a>
      <a href="bookings.html">Bookings</a>
      <button id="logout-btn" class="secondary" type="button">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Flight Search</h1>
      <form id="flight-search-form" class="grid" novalidate>
        <div>
          <label for="departure">Departure</label>
          <input id="departure" name="departure" placeholder="CMB" />
        </div>
        <div>
          <label for="destination">Destination</label>
          <input id="destination" name="destination" placeholder="DXB" />
        </div>
        <div>
          <label for="date">Travel Date</label>
          <input id="date" name="date" type="date" />
        </div>
        <button type="submit">Search Flights</button>
      </form>
      <p id="flights-message" class="notice">Loading flights...</p>
    </section>

    <section class="panel">
      <table>
        <thead>
          <tr>
            <th>Flight No</th>
            <th>Airline</th>
            <th>Route</th>
            <th>Departure</th>
            <th>Seats</th>
            <th>Base Price</th>
            <th>Flight ID</th>
          </tr>
        </thead>
        <tbody id="flights-body"></tbody>
      </table>
    </section>
  </main>

  <script src="../assets/js/agent-common.js"></script>
  <script src="../assets/js/agent-flights.js"></script>
</body>
</html>
