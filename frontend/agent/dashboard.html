<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBridge RMS - Agent Dashboard</title>
  <link rel="stylesheet" href="../assets/css/agent.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>SkyBridge RMS</strong>
      <span id="session-user"></span>
    </div>
    <nav>
      <a class="active" href="dashboard.html">Dashboard</a>
      <a href="flights.html">Flights</a>
      <a href="passengers.html">Passengers</a>
      <a href="bookings.html">Bookings</a>
      <button id="logout-btn" class="secondary" type="button">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Agent Dashboard</h1>
      <p id="dashboard-message" class="notice">Loading summary...</p>
    </section>

    <section class="cards">
      <article class="card">
        <h3>Total Bookings</h3>
        <div id="metric-total" class="metric">0</div>
      </article>
      <article class="card">
        <h3>Success Revenue</h3>
        <div id="metric-revenue" class="metric">$0.00</div>
      </article>
      <article class="card">
        <h3>Pending Bookings</h3>
        <div id="metric-pending" class="metric">0</div>
      </article>
      <article class="card">
        <h3>Cancelled Bookings</h3>
        <div id="metric-cancelled" class="metric">0</div>
      </article>
    </section>
  </main>

  <script src="../assets/js/agent-common.js"></script>
  <script src="../assets/js/agent-dashboard.js"></script>
</body>
</html>
