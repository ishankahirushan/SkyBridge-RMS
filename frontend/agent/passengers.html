<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBridge RMS - Passenger Verification</title>
  <link rel="stylesheet" href="../assets/css/agent.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>SkyBridge RMS</strong>
      <span id="session-user"></span>
    </div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="flights.html">Flights</a>
      <a class="active" href="passengers.html">Passengers</a>
      <a href="bookings.html">Bookings</a>
      <button id="logout-btn" class="secondary" type="button">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Passenger Verification</h1>
      <form id="verify-form" class="grid" novalidate>
        <div>
          <label for="verify-passport">Passport No</label>
          <input id="verify-passport" name="passport_no" required />
        </div>
        <button type="submit">Verify Passport</button>
      </form>
      <p id="verification-status" class="notice">No verification performed yet.</p>
    </section>

    <section class="panel">
      <h2>Passenger Registration</h2>
      <form id="register-form" class="grid" novalidate>
        <div>
          <label for="reg-passport">Passport No</label>
          <input id="reg-passport" required />
        </div>
        <div>
          <label for="reg-given">Given Names</label>
          <input id="reg-given" required />
        </div>
        <div>
          <label for="reg-surname">Surname</label>
          <input id="reg-surname" required />
        </div>
        <div>
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" />
        </div>
        <div>
          <label for="reg-contact">Contact</label>
          <input id="reg-contact" />
        </div>
        <button type="submit">Save Passenger</button>
      </form>
      <p id="passenger-message" class="notice">Ready.</p>
    </section>
  </main>

  <script src="../assets/js/agent-common.js"></script>
  <script src="../assets/js/agent-passengers.js"></script>
</body>
</html>
