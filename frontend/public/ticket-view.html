<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBridge RMS - View Ticket</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1b2b4b 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1em;
      color: rgba(255, 255, 255, 0.8);
    }

    .search-section {
      background: white;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .search-section h2 {
      color: #0a1628;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    .search-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      color: #0b1220;
      margin-bottom: 8px;
    }

    .form-group input {
      padding: 10px;
      border: 1px solid #e3e8ef;
      border-radius: 4px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2f6bff;
      box-shadow: 0 0 0 3px rgba(47, 107, 255, 0.1);
    }

    .search-button {
      grid-column: 1 / -1;
      padding: 12px 30px;
      background: #2f6bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .search-button:hover {
      background: #1f52cc;
    }

    .ticket-section {
      display: none;
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .ticket-section.active {
      display: block;
    }

    .ticket-header {
      border-bottom: 3px solid #2f6bff;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .ticket-number {
      font-size: 1.3em;
      font-weight: 700;
      color: #0a1628;
    }

    .ticket-status {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 15px;
      background: #1f9d55;
      color: white;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 600;
    }

    .ticket-section .error {
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 4px;
      border-left: 4px solid #dc2626;
    }

    .ticket-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .ticket-block {
      padding: 20px;
      background: #f7f9fc;
      border-radius: 4px;
    }

    .ticket-block h3 {
      color: #0a1628;
      margin-bottom: 15px;
      font-size: 1.2em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ticket-block p {
      color: #4b5563;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .ticket-block strong {
      color: #0b1220;
    }

    .flight-info {
      grid-column: 1 / -1;
      padding: 20px;
      background: #f7f9fc;
      border-radius: 4px;
    }

    .flight-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .airport-info {
      text-align: center;
    }

    .airport-code {
      font-size: 1.5em;
      font-weight: 700;
      color: #0a1628;
    }

    .airport-name {
      font-size: 0.9em;
      color: #4b5563;
      margin-top: 5px;
    }

    .flight-arrow {
      font-size: 1.5em;
      color: #2f6bff;
    }

    .flight-times {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 15px;
    }

    .time-info {
      text-align: center;
    }

    .time {
      font-size: 1.2em;
      font-weight: 700;
      color: #0a1628;
    }

    .time-label {
      font-size: 0.9em;
      color: #4b5563;
      margin-top: 5px;
    }

    .price-breakdown {
      grid-column: 1 / -1;
      padding: 20px;
      background: #f7f9fc;
      border-radius: 4px;
    }

    .price-breakdown h3 {
      color: #0a1628;
      margin-bottom: 15px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e3e8ef;
      color: #4b5563;
    }

    .price-row.total {
      border-bottom: 2px solid #2f6bff;
      font-weight: 700;
      font-size: 1.1em;
      color: #0a1628;
    }

    .ticket-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #2f6bff;
      color: white;
    }

    .btn-primary:hover {
      background: #1f52cc;
    }

    .btn-secondary {
      background: #e3e8ef;
      color: #0a1628;
    }

    .btn-secondary:hover {
      background: #d0d8e0;
    }

    .message-box {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }

    .message-box.error {
      background: #fee;
      color: #c33;
      border-left: 4px solid #dc2626;
    }

    .message-box.success {
      background: #efe;
      color: #0a0;
      border-left: 4px solid #1f9d55;

        .message-box.info {
          background: #eef;
          color: #00a;
          border-left: 4px solid #2f6bff;
        }
    }

    .message-box.show {
      display: block;
    }

    @media (max-width: 768px) {
      .search-form {
        grid-template-columns: 1fr;
      }

      .ticket-grid {
        grid-template-columns: 1fr;
      }

      .flight-header {
        grid-template-columns: 1fr;
      }

      .ticket-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }

    @media print {
      body {
        background: white;
      }

      .search-section,
      .ticket-actions {
        display: none;
      }

      .ticket-section {
        box-shadow: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SkyBridge RMS</h1>
      <p>View Your Ticket</p>
    </div>

    <div class="search-section">
      <h2>Enter Booking Details</h2>
      
      <form id="ticketSearchForm" class="search-form">
        <div class="form-group">
          <label for="bookingRef">Booking Reference *</label>
          <input 
            type="text" 
            id="bookingRef" 
            placeholder="e.g., BK-001-ABC123" 
            required
          />
        </div>

        <div class="form-group">
          <label for="passportNo">Passport Number *</label>
          <input 
            type="text" 
            id="passportNo" 
            placeholder="e.g., P123456789" 
            required
          />
        </div>

        <button type="submit" class="search-button">View Ticket</button>
      </form>

      <div id="searchMessage" class="message-box"></div>
    </div>

    <div id="ticketDisplay" class="ticket-section">
      <!-- Ticket content will be loaded here -->
    </div>
  </div>

  <script src="../assets/js/ticket-view.js"></script>
</body>
</html>
