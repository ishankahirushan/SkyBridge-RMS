<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Booking - SkyBridge RMS</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>SkyBridge RMS</h1>
                <p class="tagline">Airline Ticket Agency Management System</p>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#search">Search</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="search-section">
            <div class="container">
                <div style="max-width: 500px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: var(--shadow);">
                    <h2 style="color: var(--primary-color); margin-bottom: 1.5rem; text-align: center;">Search Your Booking</h2>
                    
                    <form id="searchForm" style="display: flex; flex-direction: column; gap: 1rem;">
                        <div class="form-group">
                            <label for="bookingRef">Booking Reference:</label>
                            <input 
                                type="text" 
                                id="bookingRef" 
                                name="booking_ref" 
                                required 
                                placeholder="e.g., SKY-20260515-ABC123"
                                style="font-family: monospace; text-transform: uppercase;"
                            >
                        </div>

                        <div id="errorMessage" class="error-message" style="display: none;"></div>

                        <button type="submit" class="btn btn-primary btn-block">Search Booking</button>
                    </form>

                    <div id="searchResults" style="margin-top: 2rem; display: none;">
                        <div id="bookingDetails"></div>
                        <div style="margin-top: 1rem;">
                            <button onclick="downloadTicketPDF()" class="btn btn-success" style="margin-right: 0.5rem;">📥 Download PDF</button>
                            <button onclick="printTicket()" class="btn btn-info">🖨️ Print Ticket</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SkyBridge RMS. All rights reserved.</p>
            <p>For booking support, contact your travel agent.</p>
        </div>
    </footer>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // Initialize search form
        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const bookingRef = document.getElementById('bookingRef').value.trim().toUpperCase();
            const errorDiv = document.getElementById('errorMessage');
            const resultsDiv = document.getElementById('searchResults');

            if (!bookingRef) {
                showError('Please enter a booking reference', 'errorMessage');
                return;
            }

            showLoading(true);

            try {
                // Use the bookings search API
                const response = await fetch(`http://localhost:8000/backend/bookings/search.php?booking_ref=${encodeURIComponent(bookingRef)}`);
                const result = await response.json();

                if (result.status === 'success' && result.data) {
                    displayBookingTicket(result.data);
                    resultsDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                } else {
                    showError('Booking not found. Please check the reference number.', 'errorMessage');
                    resultsDiv.style.display = 'none';
                }
            } catch (error) {
                showError('Error searching booking: ' + error.message, 'errorMessage');
                resultsDiv.style.display = 'none';
            } finally {
                showLoading(false);
            }
        });

        function displayBookingTicket(booking) {
            const detailsDiv = document.getElementById('bookingDetails');
            
            const ticketHTML = `
                <div style="border: 2px dashed var(--primary-color); padding: 1.5rem; border-radius: 8px; background-color: var(--light-gray);">
                    <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Booking Ticket</h3>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                        <div>
                            <strong>Booking Reference:</strong>
                            <p style="font-family: monospace; font-size: 1.1rem; color: var(--primary-color);">${booking.booking_ref}</p>
                        </div>
                        <div>
                            <strong>Status:</strong>
                            <p style="font-weight: 500; color: ${booking.payment_status === 'paid' ? 'var(--success-color)' : 'var(--warning-color)'}">${booking.payment_status?.toUpperCase()}</p>
                        </div>
                    </div>

                    <hr style="border: none; border-top: 1px solid var(--border-color); margin: 1rem 0;">

                    <h4 style="margin-bottom: 0.5rem;">Passenger Information</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                        <div>
                            <strong>Name:</strong>
                            <p>${booking.passenger_name || 'N/A'}</p>
                        </div>
                        <div>
                            <strong>Passport:</strong>
                            <p>${booking.passport_number || 'N/A'}</p>
                        </div>
                    </div>

                    <hr style="border: none; border-top: 1px solid var(--border-color); margin: 1rem 0;">

                    <h4 style="margin-bottom: 0.5rem;">Flight Information</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                        <div>
                            <strong>Flight:</strong>
                            <p>${booking.flight_code || 'N/A'} (${booking.airline_name || 'N/A'})</p>
                        </div>
                        <div>
                            <strong>Departure:</strong>
                            <p>${booking.departure_date ? formatDate(booking.departure_date) : 'N/A'}</p>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                        <div>
                            <strong>Route:</strong>
                            <p>${booking.departure_airport || 'N/A'} → ${booking.arrival_airport || 'N/A'}</p>
                        </div>
                        <div>
                            <strong>Seat:</strong>
                            <p>${booking.seat_number || 'N/A'}</p>
                        </div>
                    </div>

                    <hr style="border: none; border-top: 1px solid var(--border-color); margin: 1rem 0;">

                    <h4 style="margin-bottom: 0.5rem;">Pricing</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <strong>Base Price:</strong>
                            <p>${formatCurrency(booking.base_price || 0)}</p>
                        </div>
                        <div>
                            <strong>Total Amount:</strong>
                            <p style="font-weight: bold; color: var(--primary-color); font-size: 1.1rem;">${formatCurrency(booking.total_amount || 0)}</p>
                        </div>
                    </div>

                    <p style="margin-top: 1rem; font-size: 0.85rem; color: var(--dark-gray);">
                        <em>Booking Date: ${booking.created_at ? formatDateTime(booking.created_at) : 'N/A'}</em>
                    </p>
                </div>
            `;

            detailsDiv.innerHTML = ticketHTML;
        }

        function downloadTicketPDF() {
            alert('PDF download functionality to be implemented in Phase 11');
        }

        function printTicket() {
            window.print();
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric'
            });
        }

        function formatDateTime(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'LKR'
            }).format(amount);
        }

        function showError(message, containerId) {
            const container = document.getElementById(containerId);
            if (container) {
                container.textContent = message;
                container.style.display = 'block';
                setTimeout(() => {
                    container.style.display = 'none';
                }, 8000);
            }
        }

        function showLoading(show = true) {
            const spinner = document.getElementById('loadingSpinner') || createSpinner();
            spinner.style.display = show ? 'flex' : 'none';
        }

        function createSpinner() {
            const spinner = document.createElement('div');
            spinner.id = 'loadingSpinner';
            spinner.className = 'loading-spinner';
            spinner.innerHTML = '<div class="spinner"></div><p>Loading...</p>';
            document.body.appendChild(spinner);
            return spinner;
        }
    </script>
</body>
</html>
