<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBridge RMS - Search Tickets</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1b2b4b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .search-card {
      background: white;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .search-card h2 {
      color: #0a1628;
      margin-bottom: 30px;
      font-size: 1.8em;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #0b1220;
      margin-bottom: 8px;
      font-size: 1.05em;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e3e8ef;
      border-radius: 4px;
      font-size: 1em;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #2f6bff;
      box-shadow: 0 0 0 3px rgba(47, 107, 255, 0.1);
    }

    .search-button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2f6bff 0%, #1f52cc 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .search-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(47, 107, 255, 0.3);
    }

    .search-button:active {
      transform: translateY(0);
    }

    .divider {
      text-align: center;
      margin: 30px 0;
      color: #8a94a6;
    }

    .divider::before {
      content: '';
      display: inline-block;
      width: 100%;
      height: 1px;
      background: #e3e8ef;
      position: relative;
      top: -10px;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #2f6bff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: #1f52cc;
    }

    .info-box {
      background: #f7f9fc;
      border-left: 4px solid #c9a227;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      color: #4b5563;
      font-size: 0.95em;
      line-height: 1.6;
    }

    .info-box strong {
      color: #0b1220;
    }

    @media (max-width: 480px) {
      .search-card {
        padding: 25px;
      }

      .header h1 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✈️ SkyBridge RMS</h1>
      <p>Search Your Ticket</p>
    </div>

    <div class="search-card">
      <h2>Find Your Booking</h2>
      
      <form id="ticketSearchForm">
        <div class="form-group">
          <label for="bookingRef">Booking Reference *</label>
          <input 
            type="text" 
            id="bookingRef" 
            name="bookingRef"
            placeholder="e.g., BK-001-ABC123" 
            required
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="passportNo">Passport Number *</label>
          <input 
            type="text" 
            id="passportNo" 
            name="passportNo"
            placeholder="e.g., P123456789" 
            required
            autocomplete="off"
          />
        </div>

        <button type="submit" class="search-button">🔍 Search My Ticket</button>
      </form>

      <div class="info-box">
        <strong>Need help?</strong><br/>
        You can find your booking reference in your confirmation email. Your passport number should match your travel document.
      </div>

      <div class="back-link">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('ticketSearchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const bookingRef = document.getElementById('bookingRef').value.trim();
      const passportNo = document.getElementById('passportNo').value.trim();
      
      if (!bookingRef || !passportNo) {
        alert('Please enter both booking reference and passport number');
        return;
      }
      
      // Redirect to ticket-view.html with parameters
      window.location.href = `ticket-view.html?booking_ref=${encodeURIComponent(bookingRef)}&passport_no=${encodeURIComponent(passportNo)}`;
    });
  </script>
</body>
</html>
