<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBridge RMS - Reports</title>
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>SkyBridge RMS</strong>
      <span id="session-user"></span>
    </div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="airlines.html">Airlines</a>
      <a href="agents.html">Agents</a>
      <a class="active" href="reports.html">Reports</a>
      <button id="logout-btn" class="secondary" type="button">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Operational Reports</h1>
      <p class="notice" id="reports-message">Loading reports...</p>
    </section>

    <section class="cards">
      <article class="card">
        <h3>Total Bookings</h3>
        <div id="report-bookings" class="metric">0</div>
      </article>
      <article class="card">
        <h3>Total Revenue</h3>
        <div id="report-revenue" class="metric">$0.00</div>
      </article>
      <article class="card">
        <h3>Total Refunds</h3>
        <div id="report-refunds" class="metric">0</div>
      </article>
    </section>

    <section class="panel">
      <h2>Bookings per Airline</h2>
      <table>
        <thead>
          <tr>
            <th>Airline</th>
            <th>Bookings</th>
          </tr>
        </thead>
        <tbody id="bookings-airline-body"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Popular Destinations</h2>
      <table>
        <thead>
          <tr>
            <th>Destination</th>
            <th>Bookings</th>
          </tr>
        </thead>
        <tbody id="popular-destinations-body"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Agent Activity</h2>
      <table>
        <thead>
          <tr>
            <th>Agent</th>
            <th>Bookings</th>
          </tr>
        </thead>
        <tbody id="agent-activity-body"></tbody>
      </table>
    </section>
  </main>

  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/admin-reports.js"></script>
</body>
</html>
