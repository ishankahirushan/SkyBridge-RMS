<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBridge RMS - Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>SkyBridge RMS</strong>
      <span id="session-user"></span>
    </div>
    <nav>
      <a class="active" href="dashboard.html">Dashboard</a>
      <a href="airlines.html">Airlines</a>
      <a href="agents.html">Agents</a>
      <a href="reports.html">Reports</a>
      <button id="logout-btn" class="secondary" type="button">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Admin Dashboard</h1>
      <p class="notice" id="dashboard-message">Loading metrics...</p>
    </section>

    <section class="cards">
      <article class="card">
        <h3>Total Bookings</h3>
        <div id="total-bookings" class="metric">0</div>
      </article>
      <article class="card">
        <h3>Total Revenue</h3>
        <div id="total-revenue" class="metric">$0.00</div>
      </article>
      <article class="card">
        <h3>Total Refunds</h3>
        <div id="total-refunds" class="metric">0</div>
      </article>
      <article class="card">
        <h3>Top Airline by Bookings</h3>
        <div id="top-airline" class="metric">No data yet</div>
      </article>
    </section>
  </main>

  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/admin-dashboard.js"></script>
</body>
</html>
