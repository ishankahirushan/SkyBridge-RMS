<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBridge RMS - Airline Management</title>
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>SkyBridge RMS</strong>
      <span id="session-user"></span>
    </div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="airlines.html">Airlines</a>
      <a href="agents.html">Agents</a>
      <a href="reports.html">Reports</a>
      <button id="logout-btn" class="secondary" type="button">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Airline Management</h1>
      <p class="notice" id="airlines-message">Loading airlines...</p>
      <table>
        <thead>
          <tr>
            <th>Airline</th>
            <th>Code</th>
            <th>Country</th>
            <th>Agency Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="airlines-body"></tbody>
      </table>
    </section>
  </main>

  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/admin-airlines.js"></script>
</body>
</html>
